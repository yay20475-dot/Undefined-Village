// ================= COLLISION =================

function collides(x,z){

for(const w of walls){

// bỏ qua cửa đang mở

const house = houses.find(h =>
h.door.position.x === w.position.x &&
h.door.position.z === w.position.z
);

if(house?.open) continue;

const sx = w.geometry.parameters.width/2;
const sz = w.geometry.parameters.depth/2;

if(
x > w.position.x-sx-0.5 &&
x < w.position.x+sx+0.5 &&
z > w.position.z-sz-0.5 &&
z < w.position.z+sz+0.5
){
return true;
}
}

return false;
}

function createNpcMesh(type, colorBody, colorHead) {
    const group = new THREE.Group();
    const torso = makeBox(1, 1.2, 0.6, colorBody, 0, 1, 0);
    group.add(torso);
    
    const head = makeBox(0.6, 0.6, 0.6, colorHead, 0, 1.9, 0);
    group.add(head);

    if (type === "Grandpa") {
        head.position.set(0, 1.8, 0.15);
        const cane = makeBox(0.1, 1.2, 0.1, 0x5c4033, 0.6, 0.6, 0.2);
        group.add(cane);
    }
    else if (type === "Grandma") {
        const hairBun = makeBox(0.3, 0.3, 0.3, 0xcccccc, 0, 1.9, -0.4);
        group.add(hairBun);
    }
else if(type === "VillageChief"){

    // mũ trưởng làng
    const hat = makeBox(
        0.9,0.25,0.9,
        0x111111,
        0,2.25,0
    );

    group.add(hat);

    // súng đeo tay
    const gun = makeBox(
        0.8,0.15,0.15,
        0x444444,
        0.8,1.1,0
    );

    group.add(gun);
}
else if(type === "Shaman"){

    // khăn trùm đầu
    const hood = makeBox(
        0.8,0.8,0.8,
        0x551188,
        0,1.9,0
    );

    group.add(hood);

    // bùa hộ mệnh
    const charm = makeBox(
        0.2,0.4,0.1,
        0xffff00,
        0,0.8,0.35
    );

    group.add(charm);

    // gậy phép
    const staff = makeBox(
        0.12,1.5,0.12,
        0x553311,
        0.55,0.8,0
    );

    group.add(staff);

    const orb = makeBox(
        0.25,0.25,0.25,
        0x00ffff,
        0.55,1.65,0
    );

    group.add(orb);
}
    else {
        const leftLeg = makeBox(0.3, 0.4, 0.3, 0x333333, -0.25, 0.2, 0);
        const rightLeg = makeBox(0.3, 0.4, 0.3, 0x333333, 0.25, 0.2, 0);
        group.add(leftLeg, rightLeg);
    }

    return group;
}

// 💀 HÀM XỬ LÝ KHI NPC BỊ KHAI TỬ (ALIVE = FALSE)
function killNpc(npc) {
    if (!npc.alive) return; // Nếu đã chết rồi thì bỏ qua
    npc.alive = false;

if(
npc.name === "VillageChief" &&
npc.hasGun
){

    droppedGun = {

        x:npc.x,
        z:npc.z,

        cooldown:0,

        mesh:makeBox(
            0.8,
            0.2,
            0.3,
            0x444444,
            npc.x,
            0.2,
            npc.z
        )
    };

}

    // 1. Xóa bỏ hình thể cũ ra khỏi màn chơi
    if (npc.mesh) {
        scene.remove(npc.mesh);
    }

    // 2. Tạo một nhóm mesh mới đại diện cho xác chết
    const deadGroup = new THREE.Group();

    // Vũng máu hình tròn đỏ tươi sát mặt đất (dùng Box mỏng dính để đồng bộ với hàm makeBox của bạn)
    // Rộng 2.5, dài 2.5, cao chỉ 0.02 đơn vị để nằm bẹt dưới sàn
    const bloodPool = makeBox(2.5, 0.02, 2.5, 0xff0000, 0, 0.01, 0);
    deadGroup.add(bloodPool);

    // Cái hộp nằm bẹp (Cơ thể biến dạng) màu đỏ sẫm u ám
    // Kích thước bẹp rúm: Rộng 1.4, cao 0.2, dài 0.8
    const crushedBody = makeBox(1.4, 0.2, 0.8, 0x660000, 0, 0.1, 0);
    deadGroup.add(crushedBody);

    // 3. Cập nhật lại mesh mới cho NPC và đưa vào thế giới game
    npc.mesh = deadGroup;
    npc.mesh.position.set(npc.x, 0, npc.z);
    scene.add(npc.mesh);
}

function updateNpc(){

for(const npc of npcs){

if(npc.gunCooldown > 0)
npc.gunCooldown--;

if(!npc.alive) continue;

// tốc độ
let speed =
(npc.name === "Grandpa" ||
 npc.name === "Grandma")
? 0.035
: 0.06;

if(
npc.name === "Shaman" &&
npc.alive
){

    const d =
    Math.hypot(
        player.x - npc.x,
        player.z - npc.z
    );

    if(d < 3){

        nearShaman = true;

        eatBtn.style.display =
        "block";

        eatBtn.innerText =
        "CHARM";
    }
}

// ================= THẤY QUỶ =================

const demonDist =
Math.hypot(
demon.x - npc.x,
demon.z - npc.z
);

const seesDemon =
demon.active &&
demonDist < 25 &&
canSee(
npc.x,
npc.z,
demon.x,
demon.z
);

if(
npc.name === "VillageChief" &&
npc.hasGun &&
seesDemon &&
npc.gunCooldown <= 0
){

    demonStun = 300; // 5 giây (60fps)

    npc.gunCooldown = 1800; // 30 giây

    msgDiv.innerText =
    "Village Chief shot the demon!";
}

// ================= ÔNG BÀ BẢO VỆ PLAYER =================

if(
seesDemon &&
(npc.name === "Grandpa" ||
 npc.name === "Grandma")
){

const pd =
Math.hypot(
player.x - demon.x,
player.z - demon.z
);

if(pd < 20){

// chạy về phía quỷ để dụ

const dx =
demon.x - npc.x;

const dz =
demon.z - npc.z;

const dist =
Math.hypot(dx,dz);

if(dist > 0){

const nx =
npc.x + dx/dist*speed;

const nz =
npc.z + dz/dist*speed;

if(!collides(nx,npc.z))
npc.x = nx;

if(!collides(npc.x,nz))
npc.z = nz;

}

npc.mesh.position.set(
npc.x,
0,
npc.z
);

continue;

}

}

// ================= NGƯỜI THƯỜNG CHẠY =================

if(seesDemon){

const dx =
npc.x - demon.x;

const dz =
npc.z - demon.z;

const dist =
Math.hypot(dx,dz);

if(dist > 0){

const nx =
npc.x + dx/dist*speed*1.5;

const nz =
npc.z + dz/dist*speed*1.5;

if(!collides(nx,npc.z))
npc.x = nx;

if(!collides(npc.x,nz))
npc.z = nz;

}

// mở cửa nếu đứng gần

for(const h of houses){

const dd =
Math.hypot(
npc.x - h.door.position.x,
npc.z - h.door.position.z
);

if(dd < 2){

h.open = true;
h.door.visible = false;

}

}

}
else{

// ================= ĐI LANG THANG =================

npc.walkTimer ??= 0;
npc.walkTimer--;

if(npc.walkTimer <= 0){

// thích ra khỏi nhà

npc.dx =
(Math.random()-0.5)*0.08;

npc.dz =
(Math.random()-0.5)*0.08;

npc.walkTimer =
60 + Math.random()*180;

}

// collision

const nx =
npc.x + npc.dx;

const nz =
npc.z + npc.dz;

if(!collides(nx,npc.z)){
npc.x = nx;
}else{
npc.dx *= -1;
}

if(!collides(npc.x,nz)){
npc.z = nz;
}else{
npc.dz *= -1;
}

// mở cửa nếu gặp

for(const h of houses){

const dd =
Math.hypot(
npc.x - h.door.position.x,
npc.z - h.door.position.z
);

if(dd < 1.5){

if(!h.broken){
    h.open = true;
    h.door.visible = false;
}

}

}

}

npc.mesh.position.set(
npc.x,
0,
npc.z
);

}

}

// Hàm bổ trợ tạo nhóm bộ phận để dễ quản lý tọa độ cục bộ
function createDemonMesh() {
    const group = new THREE.Group();

    // 1. Thân mình (Torso) - Làm gốc để gắn các bộ phận khác
    const torso = makeBox(2, 2.5, 1.5, 0xaa0000, 0, 1.25, 0);
    group.add(torso);

    // 2. Đầu (Head) - Đặt phía trên thân
    const head = makeBox(1.2, 1.2, 1.2, 0x880000, 0, 3.1, 0);
    group.add(head);

    // 3. Sừng trái & phải (Horn L/R) - Gắn trên đầu
    const leftHorn = makeBox(0.3, 0.8, 0.3, 0x111111, -0.4, 3.9, 0.2);
    const rightHorn = makeBox(0.3, 0.8, 0.3, 0x111111, 0.4, 3.9, 0.2);
    group.add(leftHorn, rightHorn);

    // 4. Tay trái & phải (Arm L/R) - Gắn hai bên thân
    const leftArm = makeBox(0.5, 1.8, 0.5, 0xaa0000, -1.3, 1.6, 0);
    const rightArm = makeBox(0.5, 1.8, 0.5, 0xaa0000, 1.3, 1.6, 0);
    group.add(leftArm, rightArm);

    // 5. Chân trái & phải (Leg L/R) - Gắn phía dưới thân
    const leftLeg = makeBox(0.6, 1.2, 0.6, 0x660000, -0.5, 0.6, 0);
    const rightLeg = makeBox(0.6, 1.2, 0.6, 0x660000, 0.5, 0.6, 0);
    group.add(leftLeg, rightLeg);

    // 6. Đuôi (Tail) - Gắn phía sau
    const tail = makeBox(0.3, 0.3, 1.5, 0x550000, 0, 0.8, -1);
    group.add(tail);

    return group;
}

    active:false,
    target:null,
    breakingHouse:null,
    leavingHouse:false,
    leaveDoor:null,
stuckTime:0,
lastCheckX:0,
lastCheckZ:0,
    mesh:createDemonMesh()
};

// Thiết lập vị trí ban đầu cho toàn bộ nhóm trên bản đồ
demon.mesh.position.set(demon.x, 0, demon.z);

// ================= FOOD =================

const foods = [];

function spawnFood(x,z){

const food = {

energy:
10,

mesh:makeBox(
0.6,
0.4,
0.6,
0xffaa33,
x,
0.2,
z
)

};

foods.push(food);

}

// rải đồ ăn quanh làng

for(let i=0;i<50;i++){

spawnFood(

Math.random()*160 - 80,

Math.random()*160 - 80

);

}

let nearFood = null;

// ================= PLAYER START =================

player.x = 0;
player.z = 0;

camera.position.set(
player.x,
player.y,
player.z
);

// ================= INTERACT BUTTON =================

let nearDoor = null;

eatBtn.onclick = ()=>{

// ăn đồ

if(nearFood){

eatBtn.innerText = "EAT";

energy += nearFood.energy;

if(energy > 100){
energy = 100;
}

energyDiv.innerText =
"Energy: " + energy;

msgDiv.innerText =
"You found food. +" +
nearFood.energy +
" energy.";

scene.remove(
nearFood.mesh
);

foods.splice(
foods.indexOf(nearFood),
1
);

nearFood = null;

return;

}

if(nearGun){

    player.hasGun = true;

    scene.remove(
        droppedGun.mesh
    );

    droppedGun = null;

    msgDiv.innerText =
    "You picked up the gun.";

    return;
}

if(
player.hasGun &&
demon.active &&
player.gunCooldown <= 0
){

    const dist =
    Math.hypot(
        demon.x-player.x,
        demon.z-player.z
    );

    if(dist < 25){

        demonStun = 300;

        player.gunCooldown = 1800;

        msgDiv.innerText =
        "You shot the demon.";

        return;
    }
}

if(nearShaman){

    invisibilityTimer = 600;

    msgDiv.innerText =
    "You received an invisibility charm.";

    return;
}

// cửa

if(!nearDoor) return;

const house =
houses.find(
h=>h.door===nearDoor
);

if(house.broken) return;

house.open = !house.open;

nearDoor.visible =
!house.open;

msgDiv.innerText =
nearDoor.visible
? "Door closed"
: "Door opened";

};

// ================= CLOCK =================

setInterval(()=>{

gameMinutes += 2;

let h =
Math.floor(gameMinutes/60)%24;

let m =
Math.floor(gameMinutes%60);

timeDiv.innerText =
String(h).padStart(2,"0")
+":"+
String(m).padStart(2,"0");

if(h === 23 && !demon.active){

    demon.active = true;

    scene.add(demon.mesh);

    msgDiv.innerText =
    "The demon has entered the village.";
}

if(h === 6){

alert(
"You survived until sunrise."
);

location.reload();

}

},1000);

// ================= DEMON AI =================

function updateDemon() {
    if (!demon.active) return;

if(demonStun > 0){

    demonStun--;

    return;
}

if(
    demon.leavingHouse &&
    demon.leaveDoor
){

    const tx =
    demon.leaveDoor.door.position.x;

    const tz =
    demon.leaveDoor.door.position.z;

    const dx = tx - demon.x;
    const dz = tz - demon.z;

    const dist =
    Math.hypot(dx,dz);

    if(dist > 1){

        demon.x += dx/dist * 0.12;
        demon.z += dz/dist * 0.12;
    }
    else{

        demon.leavingHouse = false;
        demon.leaveDoor = null;
    }

    demon.mesh.position.set(
        demon.x,
        0,
        demon.z
    );

    return;
}

demon.breakingHouse = null;

if(demon.target){

    for(const h of houses){

        const inside =
        Math.abs(demon.target.x - h.x) < 5 &&
        Math.abs(demon.target.z - h.z) < 5;

        if(
            inside &&
            !h.broken
        ){
            demon.breakingHouse = h;
            break;
        }
    }
}

    // 1. Chọn mục tiêu ngẫu nhiên nếu chưa có hoặc mục tiêu cũ đã chết

if (!demon.target || !demon.target.alive) {

let targets = [];

// Player

if(invisibilityTimer <= 0){

    targets.push({
        name:"Player",
        x:player.x,
        z:player.z,
        alive:true,
        isPlayer:true
    });

}

// NPC
for(const n of npcs){

    if(!n.alive) continue;

    targets.push(n);
}

const visibleTargets = targets.filter(t=>{

    const dist =
    Math.hypot(
        t.x - demon.x,
        t.z - demon.z
    );

    return dist < 120;
});

if(visibleTargets.length){

    visibleTargets.sort((a,b)=>{

        const da =
        Math.hypot(a.x-demon.x,a.z-demon.z);

        const db =
        Math.hypot(b.x-demon.x,b.z-demon.z);

        return da-db;
    });

    demon.target = visibleTargets[0];
}

else{

    demon.target = null;

    demon.walkTimer ??= 0;
    demon.walkTimer--;

    if(demon.walkTimer <= 0){

        demon.wanderX =
        demon.x + (Math.random()-0.5)*40;

        demon.wanderZ =
        demon.z + (Math.random()-0.5)*40;

        demon.walkTimer =
        120 + Math.random()*240;
    }
}
}

    // 2. Đuổi theo và triệt hạ mục tiêu
    if (demon.target) {
        // LƯU Ý: Phải lấy tọa độ thực tế từ mesh của NPC vì vị trí của chúng cố định

let tx = demon.target.x;
let tz = demon.target.z;

if(demon.breakingHouse){

    tx =
    demon.breakingHouse.door.position.x;

    tz =
    demon.breakingHouse.door.position.z;
}

const dx = tx - demon.x;
const dz = tz - demon.z;

        const dist = Math.hypot(dx, dz);

if (dist > 0) {

    const newX =
    demon.x + (dx / dist) * 0.12;

    const newZ =
    demon.z + (dz / dist) * 0.12;

const speed = 0.12;

// hướng chính tới mục tiêu
let angle = Math.atan2(dz, dx);

let foundPath = false;

for(let a = 0; a <= Math.PI; a += Math.PI/12){

    const tests = [
        angle,
        angle + a,
        angle - a
    ];

    for(const ang of tests){

        const nx =
        demon.x + Math.cos(ang) * speed;

        const nz =
        demon.z + Math.sin(ang) * speed;

        if(!collides(nx,nz)){

            demon.x = nx;
            demon.z = nz;

            foundPath = true;
            break;
        }
    }

    if(foundPath) break;
}

if(
    demon.lastCheckX === undefined
){
    demon.lastCheckX = demon.x;
    demon.lastCheckZ = demon.z;
}

if(!foundPath){

    demon.stuckTime++;

}else{

    const moved =
    Math.hypot(
        demon.x - demon.lastCheckX,
        demon.z - demon.lastCheckZ
    );

    // đi qua đi lại trong vùng rất nhỏ
    if(moved < 1.5){
        demon.stuckTime++;
    }else{
        demon.stuckTime = 0;

        demon.lastCheckX = demon.x;
        demon.lastCheckZ = demon.z;
    }
}

if(demon.stuckTime > 60){

    for(let i=0;i<12;i++){

        const ang =
        Math.random()*Math.PI*2;

        const nx =
        demon.x +
        Math.cos(ang) *
        (2 + Math.random()*2);

        const nz =
        demon.z +
        Math.sin(ang) *
        (2 + Math.random()*2);

        if(!collides(nx,nz)){

            demon.x = nx;
            demon.z = nz;
            break;
        }
    }

    demon.lastCheckX = demon.x;
    demon.lastCheckZ = demon.z;
    demon.stuckTime = 0;
}

}

if (dist < 1.5) {

    // xác định nhà chứa nạn nhân
    for(const h of houses){

        const inside =
        Math.abs(demon.target.x - h.x) < 5 &&
        Math.abs(demon.target.z - h.z) < 5;

        if(inside){

            demon.leavingHouse = true;
            demon.leaveDoor = h;

            break;
        }
    }

    killNpc(demon.target);

    msgDiv.innerText =
    demon.target.name + " was killed.";

    demon.target = null;
}
    }

else if(!demon.target){

    const dx =
    demon.wanderX - demon.x;

    const dz =
    demon.wanderZ - demon.z;

    const dist =
    Math.hypot(dx,dz);

    if(dist > 1){

        const nx =
        demon.x + dx/dist*0.08;

        const nz =
        demon.z + dz/dist*0.08;

        if(!collides(nx,demon.z))
            demon.x = nx;

        if(!collides(demon.x,nz))
            demon.z = nz;
    }
}

if(
    demon.breakingHouse &&
    !demon.breakingHouse.broken
){

    const d =
    Math.hypot(
        demon.x -
        demon.breakingHouse.door.position.x,

        demon.z -
        demon.breakingHouse.door.position.z
    );

    if(d < 2){

        demon.breakingHouse.broken = true;
        demon.breakingHouse.open = true;

        demon.breakingHouse.door.visible = false;

        msgDiv.innerText =
        demon.breakingHouse.name +
        "'s door was destroyed.";

        demon.breakingHouse = null;
    }
}

demon.mesh.position.set(
demon.x,
0,
demon.z
);

scene.add(
demon.mesh
);
}

function canSee(x1,z1,x2,z2){

    const steps = 40;

    for(let i=0;i<=steps;i++){

        const t = i / steps;

        const x =
        x1 + (x2 - x1) * t;

        const z =
        z1 + (z2 - z1) * t;

        if(collides(x,z)){
            return false;
        }

    }

    return true;
}

// ================= DOOR DETECTION =================

function updateDoors(){

nearDoor = null;

for(const h of houses){

const dx =
player.x -
h.door.position.x;

const dz =
player.z -
h.door.position.z;

const dist =
Math.hypot(dx,dz);

if(dist < 3){

nearDoor = h.door;

eatBtn.style.display =
"block";

return;

}

}

if(!nearFood){

eatBtn.innerText = "USE";

eatBtn.style.display =
"none";

}

}

// ================= FOOD DETECTION =================

let nearGun = false;

function updateFood(){

nearFood = null;

for(const food of foods){

const dx =
player.x -
food.mesh.position.x;

const dz =
player.z -
food.mesh.position.z;

const dist =
Math.hypot(dx,dz);

if(dist < 2){

nearFood = food;

eatBtn.style.display =
"block";

eatBtn.innerText =
"EAT";

return;

}

}

if(droppedGun){

    const dist =
    Math.hypot(
        player.x - droppedGun.x,
        player.z - droppedGun.z
    );

    if(dist < 2){

        nearGun = true;

        eatBtn.style.display =
        "block";

        eatBtn.innerText =
        "GUN";
    }
}

}

// ================= ENERGY =================

setInterval(()=>{

energy--;

if(energy < 0){
energy = 0;
}

energyDiv.innerText =
"Energy: " + energy;

if(energy <= 0){

alert(
"You starved."
);

location.reload();

}

},1500);

// ================= PLAYER DEATH =================

function updateDanger(){

if(!demon.active) return;

const dx =
player.x - demon.x;

const dz =
player.z - demon.z;

const dist =
Math.hypot(dx,dz);

if(dist < 3){

alert(
"The demon caught you."
);

location.reload();

}

}

// ================= PLAYER =================

function updatePlayer(){

if(player.gunCooldown > 0)
player.gunCooldown--;

if(input.left){
player.rot += 0.04;
}

if(input.right){
player.rot -= 0.04;
}

let move = 0;

if(input.up){
move = -player.speed;
}

if(input.down){
move = player.speed;
}

const newX =
player.x +
Math.sin(player.rot)
* move;

const newZ =
player.z +
Math.cos(player.rot)
* move;

if(
!collides(
newX,
player.z
)
){
player.x = newX;
}

if(
!collides(
player.x,
newZ
)
){
player.z = newZ;
}

camera.position.set(
player.x,
player.y,
player.z
);

camera.rotation.y =
player.rot;

}

// ================= HOUSE BREAKING =================

function updateHouseAttack(){

if(!demon.active) return;

for(const h of houses){

if(h.broken) continue;

const dx =
h.door.position.x -
demon.x;

const dz =
h.door.position.z -
demon.z;

const dist =
Math.hypot(dx,dz);

if(dist < 2){

if(Math.random() < 0.003){

h.broken = true;
h.door.visible = false;

msgDiv.innerText =
"A door was broken.";

}

}

}

}

// ================= FINAL LOOP =================

function animate(){

requestAnimationFrame(
animate
);

if(invisibilityTimer > 0)
invisibilityTimer--;

updatePlayer();

updateFood();

updateDoors();

updateNpc();

updateDemon();

updateDanger();

updateHouseAttack();

renderer.render(
scene,
camera
);

}

scene.add(floor);

for(const h of houses){
scene.add(h.door);
}

for(const food of foods){
scene.add(food.mesh);
}

animate();

// ================= RESIZE =================

window.addEventListener(
"resize",
()=>{

camera.aspect =
innerWidth /
innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
innerWidth,
innerHeight
);

});
</script>
</body>
</html>
